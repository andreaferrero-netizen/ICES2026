<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>θ_T Tracking — Web Viewer</title>
<style>
  :root{
    --navy:#1F3864; --cyan:#00B0F0; --red:#FF0000; --grey:#BFBFBF;
    --mast:#9DC3E6; --sun:#FFD500; --ink:#22303f; --panel:#f4f7fb;
    --edge:#d3ddea;
  }
  *{box-sizing:border-box}
  html,body{height:100%; margin:0}
  body{
    font-family:"Segoe UI Emoji","Segoe UI",Calibri,system-ui,sans-serif;
    color:var(--ink); background:#ffffff;
    display:flex; flex-direction:column; overflow:hidden;
  }
  /* canvas fills all available space */
  #stage{flex:1 1 auto; position:relative; min-height:0}
  #cv{position:absolute; inset:0; width:100%; height:100%; display:block}
  #cap{
    flex:0 0 auto; text-align:center; font-size:clamp(13px,2.1vw,17px);
    font-weight:700; color:var(--navy); padding:4px 8px;
  }
  /* compact control bar */
  #bar{
    flex:0 0 auto; background:var(--panel); border-top:1px solid var(--edge);
    padding:8px 12px; display:flex; flex-wrap:wrap; align-items:center;
    gap:10px 18px;
  }
  .ctrl{display:flex; align-items:center; gap:8px; flex:1 1 260px; min-width:220px}
  .ctrl label{width:34px; font-weight:700; color:var(--navy); font-size:15px}
  .ctrl input[type=range]{flex:1; accent-color:var(--navy); min-width:90px}
  .ctrl .val{width:66px; text-align:right; font-variant-numeric:tabular-nums; font-size:13px}
  .chips{display:flex; gap:8px; flex-wrap:wrap; font-size:12px; color:#4a5a6b}
  .chip{background:#fff; border:1px solid var(--edge); border-radius:16px;
        padding:3px 10px; font-variant-numeric:tabular-nums; white-space:nowrap}
  .chip b{color:var(--navy)}
  .btns{display:flex; gap:8px}
  button{
    font:inherit; font-size:13px; font-weight:600; cursor:pointer;
    border:1px solid var(--navy); background:var(--navy); color:#fff;
    padding:6px 14px; border-radius:7px;
  }
  button.ghost{background:#fff; color:var(--navy)}
  button:hover{opacity:.86}
</style>
</head>
<body>
  <div id="stage"><canvas id="cv"></canvas></div>
  <div id="cap"></div>
  <div id="bar">
    <div class="ctrl">
      <label>θ<sub>T</sub></label>
      <input id="tt" type="range" min="-145" max="90" step="0.5" value="35">
      <span class="val" id="ttv">+35.0°</span>
    </div>
    <div class="ctrl">
      <label>θ<sub>S</sub></label>
      <input id="ts" type="range" min="0" max="55" step="0.5" value="28">
      <span class="val" id="tsv">28.0°</span>
    </div>
    <div class="chips">
      <span class="chip">Array: <b id="arr">63.0°</b></span>
      <span class="chip">θ<sub>T</sub> sweep: <b id="rng">…</b></span>
    </div>
    <div class="btns">
      <button id="play">▶ Play</button>
      <button class="ghost" id="reset">Reset</button>
    </div>
  </div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const C = {navy:'#1F3864',cyan:'#00B0F0',red:'#FF0000',grey:'#BFBFBF',
           mast:'#9DC3E6',sun:'#FFD500',ink:'#22303f'};

// layout globals (updated by resize/draw)
let Wc=800, Hc=600, PX=400, PY=310, S=118, K=1;
const REF_S = 118;                       // reference scale for proportional sizing

function computeLayout(){
  Wc = cv.clientWidth; Hc = cv.clientHeight;
  // fit ~8.4 units across each dimension, leave margins
  S  = Math.max(8, Math.min(Wc/8.6, Hc/8.6));
  PX = Wc/2;
  PY = Hc*0.52;                          // slightly low so the Sun has headroom
  K  = S/REF_S;
}

function resize(){
  const dpr = window.devicePixelRatio || 1;
  const w = cv.clientWidth, h = cv.clientHeight;
  cv.width = Math.max(1, Math.round(w*dpr));
  cv.height = Math.max(1, Math.round(h*dpr));
  ctx.setTransform(dpr,0,0,dpr,0,0);     // draw in CSS pixels
  render();
}
window.addEventListener('resize', resize);

// angle: deg clockwise from +y (up). canvas up = -y.
function pt(phiDeg, r){
  const p = phiDeg*Math.PI/180;
  return [PX + r*S*Math.sin(p), PY - r*S*Math.cos(p)];
}
function line(a,b,color,w,dash){
  ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=w;
  if(dash) ctx.setLineDash(dash); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.stroke(); ctx.restore();
}
function arc(a0,a1,r,color,w){
  ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=w; ctx.beginPath();
  const n=48;
  for(let i=0;i<=n;i++){const a=a0+(a1-a0)*i/n; const [x,y]=pt(a,r); i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
  ctx.stroke(); ctx.restore();
}
function dot(x,y,r,color){ctx.save(); ctx.fillStyle=color; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); ctx.restore();}
function thetaLabel(x,y,sub,size){
  ctx.save(); ctx.fillStyle=C.navy; ctx.textBaseline='middle';
  ctx.font=size+'px "Segoe UI",Calibri,sans-serif';
  ctx.fillText('\u03B8',x,y);
  const wq=ctx.measureText('\u03B8').width;
  ctx.font=Math.round(size*0.62)+'px "Segoe UI",Calibri,sans-serif';
  ctx.fillText(sub, x+wq*0.98, y+size*0.30); ctx.restore();
}
function arrowHead(from,to,color,w,scale){
  line(from,to,color,w);
  const ang=Math.atan2(to[1]-from[1],to[0]-from[0]); const s=scale||10;
  ctx.save(); ctx.fillStyle=color; ctx.beginPath();
  ctx.moveTo(to[0],to[1]);
  ctx.lineTo(to[0]-s*Math.cos(ang-0.4), to[1]-s*Math.sin(ang-0.4));
  ctx.lineTo(to[0]-s*Math.cos(ang+0.4), to[1]-s*Math.sin(ang+0.4));
  ctx.closePath(); ctx.fill(); ctx.restore();
}

function draw(thetaS, thetaT){
  computeLayout();
  ctx.clearRect(0,0,Wc,Hc);
  const arrayAng = thetaS + thetaT;
  const f = (px)=> px*K;                  // scale a reference pixel size
  const fs = (px)=> (px*K).toFixed(1)+'px "Segoe UI",Calibri,sans-serif';

  // HSCL (horizontal red dashed)
  line([PX-3.6*S,PY],[PX+3.6*S,PY], C.red, f(2), [f(9),f(7)]);
  ctx.save(); ctx.fillStyle=C.red; ctx.font=fs(15); ctx.textBaseline='top';
  ctx.fillText('HSCL', PX+1.75*S, PY+f(6)); ctx.restore();

  // NL (vertical cyan dashed)
  line([PX,PY-2.5*S],[PX,PY+3.4*S], C.cyan, f(2), [f(9),f(7)]);
  ctx.save(); ctx.fillStyle=C.cyan; ctx.font=fs(15); ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('NL', PX, PY+3.45*S); ctx.restore();

  // fixed vertical mast
  const mw=Math.max(6, f(12));
  ctx.save(); ctx.fillStyle=C.mast; ctx.strokeStyle='#4d4d4d'; ctx.lineWidth=Math.max(1,f(1.5));
  ctx.fillRect(PX-mw/2, PY-2.35*S, mw, 5.05*S);
  ctx.strokeRect(PX-mw/2, PY-2.35*S, mw, 5.05*S); ctx.restore();

  // hard stops
  [-2.7,2.7].forEach((ux)=>{
    dot(PX+ux*S, PY, f(9), C.navy);
    ctx.save(); ctx.fillStyle=C.navy; ctx.font=fs(15); ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('Hard Stop', PX+ux*S, PY+f(14)); ctx.restore();
  });

  // sun (fixed along theta_S direction)
  const sunPos = pt(thetaS, 3.0); sunPos[0]+=f(26); sunPos[1]-=f(6);
  ctx.save();
  for(let k=0;k<12;k++){const a=k*Math.PI/6; const dx=Math.cos(a), dy=Math.sin(a);
    line([sunPos[0]+f(30)*dx,sunPos[1]+f(30)*dy],[sunPos[0]+f(46)*dx,sunPos[1]+f(46)*dy],C.sun,f(3));}
  ctx.fillStyle=C.sun; ctx.beginPath(); ctx.arc(sunPos[0],sunPos[1],f(25),0,7); ctx.fill(); ctx.restore();
  ctx.save(); ctx.fillStyle=C.red; ctx.font=fs(15); ctx.textBaseline='middle';
  ctx.fillText('Sun', sunPos[0]+f(40), sunPos[1]-f(8));
  ctx.fillText('Direction', sunPos[0]+f(40), sunPos[1]+f(10)); ctx.restore();

  // sun-direction red arrow
  arrowHead(pt(thetaS,2.15), pt(thetaS,1.15), C.red, f(2.4), f(12));

  // rotating array bar
  line(pt(arrayAng,-2.85), pt(arrayAng,2.35), C.grey, f(11));

  // theta_S arc + label
  arc(0, thetaS, 0.98, C.navy, f(2));
  const lS = pt(thetaS/2, 1.34); thetaLabel(lS[0]-f(16), lS[1], 'S', f(22));

  // theta_T arc + label
  if(Math.abs(thetaT) > 1.2){
    arc(thetaS, arrayAng, 1.5, C.navy, f(2));
    const lT = pt((thetaS+arrayAng)/2, 1.86); thetaLabel(lT[0]-f(8), lT[1], 'T', f(22));
  }

  // caption + readouts
  let cap;
  if(thetaT > 3)      cap='Rotation with \u03B8\u209C in the same direction of \u03B8\u209B';
  else if(thetaT < -3)cap='Rotation with \u03B8\u209C in the opposite direction of \u03B8\u209B';
  else                cap='Nominal rotation with \u03B8\u209C = 0';
  document.getElementById('cap').textContent=cap;
  document.getElementById('arr').textContent=arrayAng.toFixed(1)+'\u00B0';
}

// ---- controls ----
const ttEl=document.getElementById('tt'), tsEl=document.getElementById('ts');
const ttv=document.getElementById('ttv'), tsv=document.getElementById('tsv');
const rngEl=document.getElementById('rng');
function fmt(v){return (v>=0?'+':'')+Number(v).toFixed(1)+'\u00B0';}

// theta_T range so the ARRAY sweeps hard stop to hard stop:
//   array = theta_S + theta_T in [-90,+90]  =>  theta_T in [-90-ts, +90-ts]
function ttBounds(ts){return [-90-ts, 90-ts];}
function updateTTbounds(){
  const ts=parseFloat(tsEl.value); const [lo,hi]=ttBounds(ts);
  ttEl.min=lo; ttEl.max=hi;
  let v=parseFloat(ttEl.value); if(v<lo)v=lo; if(v>hi)v=hi; ttEl.value=v;
  rngEl.textContent=fmt(lo)+' to '+fmt(hi);
}
function render(){
  const tt=parseFloat(ttEl.value), ts=parseFloat(tsEl.value);
  ttv.textContent=fmt(tt); tsv.textContent=Number(ts).toFixed(1)+'\u00B0';
  draw(ts, tt);
}
ttEl.addEventListener('input',()=>{stopPlay(); render();});
tsEl.addEventListener('input',()=>{updateTTbounds(); render();});

// ---- auto sweep (ping-pong): drive the ARRAY between the two hard stops ----
let playing=false, dir=-1, raf=null; const SPEED=0.55;
function step(){
  const ts=parseFloat(tsEl.value); const [lo,hi]=ttBounds(ts);
  let v=parseFloat(ttEl.value); v+=dir*SPEED;
  if(v<=lo){v=lo; dir=1;} else if(v>=hi){v=hi; dir=-1;}
  ttEl.value=v; render(); raf=requestAnimationFrame(step);
}
const playBtn=document.getElementById('play');
function startPlay(){playing=true; playBtn.textContent='\u2759\u2759 Pause'; raf=requestAnimationFrame(step);}
function stopPlay(){playing=false; playBtn.textContent='\u25B6 Play'; if(raf)cancelAnimationFrame(raf);}
playBtn.addEventListener('click',()=>{playing?stopPlay():startPlay();});
document.getElementById('reset').addEventListener('click',()=>{
  stopPlay(); tsEl.value=28; ttEl.value=35; updateTTbounds(); render();
});

updateTTbounds();
resize();   // sizes the canvas and does the first render
</script>
</body>
</html>
